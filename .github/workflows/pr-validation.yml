name: pr-head-e2e

# On-demand validation of an UNMERGED cdk-terrain PR before it lands: build +
# pnpm pack cdktn-cli from the PR head and run the same suite against it. This is
# how you catch a TTY/UX regression in review instead of in the nightly after merge.
on:
  workflow_dispatch:
    inputs:
      pr:
        description: "cdk-terrain PR number to validate (head built locally)"
        required: true
      repo:
        description: "Source repo"
        required: false
        default: "open-constructs/cdk-terrain"

permissions:
  contents: read

jobs:
  pr-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout e2e repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout cdk-terrain PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repo }}
          ref: refs/pull/${{ inputs.pr }}/head
          path: cdk-terrain
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - run: pnpm install --frozen-lockfile
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false
      - name: Provision PR head (build + pack cdktn-cli)
        env:
          CDKTN_MONOREPO: ${{ github.workspace }}/cdk-terrain
        run: node scripts/provision.mjs cdktn-prhead
      - name: Run e2e against PR head
        env:
          CLI_ID: cdktn-prhead
        run: pnpm test
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: svg-prhead-${{ matrix.os }}-pr${{ inputs.pr }}
          path: artifacts/
          if-no-files-found: ignore
